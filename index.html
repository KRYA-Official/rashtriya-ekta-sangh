<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>राष्ट्रीय एकता संघ | आधिकारिक मंच</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; text-align: center; }
        
        /* हेडर स्टाइल */
        .header { background-color: #013220; color: #d4af37; padding: 40px 20px; border-bottom: 5px solid #d4af37; }
        h1 { margin: 0; font-size: 26px; }
        .motto { font-size: 16px; color: #fff; margin-top: 10px; font-style: italic; }

        /* टीम सेक्शन स्टाइल */
        .team-container { padding: 20px; max-width: 600px; margin: 20px auto; }
        .team-section { background: #fff; padding: 25px; border-radius: 15px; border: 1px solid #ddd; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .team-title { color: #013220; border-bottom: 2px solid #d4af37; padding-bottom: 10px; margin-bottom: 20px; font-size: 22px; }
        
        /* नाम और पद की स्टाइल */
        .my-name { font-size: 19px; font-weight: bold; color: #013220; background: #e8f5e9; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #013220; }
        .member { margin-bottom: 15px; font-size: 16px; text-align: left; padding-left: 20px; }
        .member b { color: #013220; }
        
        /* फुटर */
        footer { margin-top: 30px; padding: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="header">
        <h1>राष्ट्रीय एकता अखिल भारतीय मजदूर कल्याण सेवा संघ</h1>
        <p class="motto">"मजदूरों की सेवा - राष्ट्र की एकता"</p>
    </div>

    <div class="team-container">
        <div class="team-section">
            <h2 class="team-title">संगठन नेतृत्व</h2>
            
            <!-- आपका नाम और पद -->
            <div class="my-name">
                राष्ट्रीय डिजिटल संयोजक: मुकेश राय
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <div class="member"><b>सचिव:</b> श्री एम.डी. सिराज अंसारी</div>
            <div class="member"><b>ज़िला अध्यक्ष (बांका):</b> श्री उमर अंसारी</div>
            <div class="member"><b>ज़िला सचिव (बांका):</b> श्री टाइगर अंसारी</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 राष्ट्रीय एकता संघ | सर्वाधिकार सुरक्षित</p>
    </footer>

</body>
</html>
