<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>राष्ट्रीय एकता अखिल भारतीय मजदूर कल्याण सेवा संघ</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f4; text-align: center; margin: 0; padding: 0; }
        .header { background-color: #013220; color: #d4af37; padding: 40px 20px; }
        h1 { margin: 0; font-size: 24px; }
        .motto { font-size: 16px; color: #fff; margin-top: 10px; }
        .container { padding: 40px; }
        .welcome-text { font-size: 18px; color: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>राष्ट्रीय एकता अखिल भारतीय मजदूर कल्याण सेवा संघ</h1>
        <p class="motto">"मजदूरों की सेवा - राष्ट्र की एकता"</p>
    </div>
    <div class="container">
        <p class="welcome-text">हमारी आधिकारिक डिजिटल वेबसाइट पर आपका स्वागत है।</p>
        <p>जल्द ही यहाँ संगठन की सभी महत्वपूर्ण सेवाएँ उपलब्ध होंगी।</p>
    </div>
</body>
</html>
